<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cubos em Rede</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
    canvas { display: block; width: min(96vw, calc(96vh * (680 / 720))); height: auto; max-height: 96vh; touch-action: none; cursor: grab; }
    canvas.dragging { cursor: grabbing; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 680, H = 720;
canvas.width = W; canvas.height = H;

const items = [
  {sym:"⚛︎",color:"#5b9bd5",dark:"#2a5fa3"},
  {sym:"⛺︎",color:"#5abf8a",dark:"#267a50"},
  {sym:"♱", color:"#c47fc4",dark:"#7a3a9a"},
  {sym:"⊙", color:"#e8a030",dark:"#a06010"},
  {sym:"⨇", color:"#e06060",dark:"#a03030"},
  {sym:"𝟁", color:"#60b8c8",dark:"#2a7a8a"},
  {sym:"☾", color:"#a08ad0",dark:"#5a3a9a"},
  {sym:"♓︎",color:"#58a8d8",dark:"#205080"},
  {sym:"☯︎",color:"#888888",dark:"#444444"},
  {sym:"⧲", color:"#d0884a",dark:"#904820"},
  {sym:"❨", color:"#78c878",dark:"#307830"},
  {sym:"♰", color:"#d06868",dark:"#903030"},
  {sym:"☩", color:"#c8a830",dark:"#806010"},
];

const positions = [
  {x:340,y:80},{x:560,y:160},{x:120,y:160},
  {x:580,y:300},{x:340,y:240},{x:100,y:300},
  {x:500,y:450},{x:200,y:450},
  {x:610,y:570},{x:440,y:590},{x:240,y:590},{x:70,y:570},
  {x:340,y:650},
];

const edges = [
  [0,1],[0,2],[0,4],
  [1,3],[1,4],[2,4],[2,5],
  [3,6],[4,6],[4,7],[5,7],
  [3,8],[6,8],[6,9],[7,9],[7,10],[5,11],[10,11],[11,12],[9,12],[10,12],
  [1,2],[3,5],[8,12],
];

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

const randomizedPositions = shuffle([...positions]);

const nodes = items.map((it,i) => ({
  ...it,
  x: randomizedPositions[i].x, y: randomizedPositions[i].y,
  phase: Math.random()*Math.PI*2,
  speed: 0.6+Math.random()*0.4,
  dragging: false,
}));

const HIT = 36;
const pulses = [];
let lastPulse = 0, t = 0;
let dragNode = null, dragOffX = 0, dragOffY = 0;

function hexRgb(h) {
  return `${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`;
}

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const scaleX = W / r.width;
  const scaleY = H / r.height;
  const src = e.touches ? e.touches[0] : e;
  return { x:(src.clientX-r.left)*scaleX, y:(src.clientY-r.top)*scaleY };
}

function hitTest(x,y) {
  for (let i=nodes.length-1;i>=0;i--) {
    const n = nodes[i];
    const fy = n.dragging ? n.y : n.y+Math.sin(t*n.speed+n.phase)*4;
    if (Math.hypot(x-n.x,y-fy)<HIT) return i;
  }
  return -1;
}

canvas.addEventListener('mousedown', e => {
  const {x,y}=getPos(e); const idx=hitTest(x,y);
  if(idx>=0) startDrag(idx,x,y);
});
canvas.addEventListener('mousemove', e => {
  if(dragNode!==null) moveDrag(getPos(e));
  else { const {x,y}=getPos(e); canvas.style.cursor=hitTest(x,y)>=0?'grab':'default'; }
});
canvas.addEventListener('mouseup',    ()=>endDrag());
canvas.addEventListener('mouseleave', ()=>endDrag());
canvas.addEventListener('touchstart', e=>{
  const {x,y}=getPos(e); const idx=hitTest(x,y);
  if(idx>=0){e.preventDefault();startDrag(idx,x,y);}
},{passive:false});
canvas.addEventListener('touchmove', e=>{
  if(dragNode!==null){e.preventDefault();moveDrag(getPos(e));}
},{passive:false});
canvas.addEventListener('touchend',()=>endDrag());

function startDrag(idx,x,y){
  dragNode=idx; nodes[idx].dragging=true;
  dragOffX=x-nodes[idx].x; dragOffY=y-nodes[idx].y;
  canvas.classList.add('dragging');
}
function moveDrag({x,y}){
  if(dragNode===null) return;
  nodes[dragNode].x=Math.max(HIT,Math.min(W-HIT,x-dragOffX));
  nodes[dragNode].y=Math.max(HIT,Math.min(H-HIT,y-dragOffY));
}
function endDrag(){
  if(dragNode!==null) nodes[dragNode].dragging=false;
  dragNode=null; canvas.classList.remove('dragging');
}

function spawnPulse(){
  const ei=Math.floor(Math.random()*edges.length);
  const [ai,bi]=edges[ei]; const rev=Math.random()>0.5;
  pulses.push({ai:rev?bi:ai,bi:rev?ai:bi,progress:0,speed:0.004+Math.random()*0.005});
}

function drawCube(x,y,size,color,dark,sym,dragging){
  const s=size,h=s*0.6,ox=s*0.5;
  const top=[{x,y:y-h/2},{x:x-ox,y:y-h/2+h*0.35},{x,y:y-h/2+h*0.7},{x:x+ox,y:y-h/2+h*0.35}];
  const bl =[{x:x-ox,y:y-h/2+h*0.35},{x:x-ox,y:y+h*0.35},{x,y:y+h*0.7},{x,y:y-h/2+h*0.7}];
  const br =[{x:x+ox,y:y-h/2+h*0.35},{x:x+ox,y:y+h*0.35},{x,y:y+h*0.7},{x,y:y-h/2+h*0.7}];

  function face(pts,fc,fa,sc){
    ctx.beginPath();
    ctx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
    ctx.closePath();
    ctx.fillStyle=`rgba(${hexRgb(fc)},${fa})`;
    ctx.fill();
    ctx.strokeStyle=`rgba(${hexRgb(sc)},${dragging?1:0.7})`;
    ctx.lineWidth=dragging?1.8:1;
    ctx.stroke();
  }

  if(dragging){ctx.shadowColor=color;ctx.shadowBlur=18;}
  face(top,color,dragging?0.35:0.22,color);
  face(bl, color,dragging?0.22:0.13,color);
  face(br, dark, dragging?0.28:0.16,dark);
  ctx.shadowBlur=0;

  ctx.save();
  ctx.font=`${Math.round(s*0.55)}px serif`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.globalAlpha=0.92;
  ctx.fillStyle=color;
  ctx.fillText(sym,x,y+s*0.05);
  ctx.restore();
}

function frame(ts){
  requestAnimationFrame(frame);
  t+=0.012;
  ctx.clearRect(0,0,W,H);

  if(ts-lastPulse>300){spawnPulse();lastPulse=ts;}
  for(let p of pulses) p.progress+=p.speed;
  pulses.splice(0,pulses.length,...pulses.filter(p=>p.progress<1.05));

  for(const [ai,bi] of edges){
    const a=nodes[ai],b=nodes[bi];
    const aY=a.dragging?a.y:a.y+Math.sin(t*a.speed+a.phase)*4;
    const bY=b.dragging?b.y:b.y+Math.sin(t*b.speed+b.phase)*4;
    ctx.beginPath();
    ctx.moveTo(a.x,aY); ctx.lineTo(b.x,bY);
    ctx.strokeStyle='rgba(160,160,200,0.2)';
    ctx.lineWidth=1; ctx.setLineDash([4,4]); ctx.stroke(); ctx.setLineDash([]);
    const pulse=pulses.find(p=>p.ai===ai&&p.bi===bi);
    if(pulse){
      const px=a.x+(b.x-a.x)*pulse.progress;
      const py=aY+(bY-aY)*pulse.progress;
      ctx.beginPath(); ctx.arc(px,py,3.5,0,Math.PI*2);
      ctx.fillStyle=`rgba(${hexRgb(nodes[ai].color)},0.9)`; ctx.fill();
    }
  }

  for(let i=0;i<nodes.length;i++){
    const n=nodes[i];
    const fy=n.dragging?n.y:n.y+Math.sin(t*n.speed+n.phase)*4;
    drawCube(n.x,fy,44,n.color,n.dark,n.sym,n.dragging);
  }
}

requestAnimationFrame(frame);
</script>
</body>
</html>
